<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snake — classic arcade game</title>
  <meta name="description" content="Snake on a 24×24 grid: growing tail, rising speed, two wall modes, persistent high score." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>SNAKE</h1>
      <div class="scores">
        <div><span class="lbl">SCORE</span><b id="score">0</b></div>
        <div><span class="lbl">BEST</span><b id="best">0</b></div>
      </div>
    </header>

    <div class="board">
      <canvas id="game" width="600" height="600"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="ovtitle">Ready?</h2>
        <p id="ovsub">Arrows / WASD / swipe to move. Eat, grow, don't bite yourself.</p>
        <div class="modes" id="modes">
          <button data-wrap="false" class="sel">Walls</button>
          <button data-wrap="true">Wrap</button>
        </div>
        <button class="start" id="start">Start</button>
      </div>
    </div>

    <p class="foot">P pause · R restart</p>
  </div>

  <script type="module" src="src/game.js"></script>
</body>
</html>
